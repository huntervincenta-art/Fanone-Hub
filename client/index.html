<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MFS Hub" />
    <meta name="theme-color" content="#1a2332" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>MFS Hub — The Michael Fanone Show</title>
    <script>
      (function() {
        var t = localStorage.getItem('team_hub_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        // Pre-check auth so React mounts already knowing auth state — prevents login flash
        try {
          var raw = localStorage.getItem('team_hub_persistent_auth');
          if (raw) {
            var saved = JSON.parse(raw);
            var THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;
            if (saved && saved.passphrase && saved.name && saved.timestamp &&
                (Date.now() - saved.timestamp) < THIRTY_DAYS) {
              window.__TEAM_HUB_AUTH__ = saved;
            }
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
